<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Traffic Lights</title>
    <link rel="stylesheet" href="trafficLight-style.css">
    <link rel="stylesheet" href="next-btn.css">
    <style>
        .btn-container {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 15px;
        }
    </style>
</head>
<body>
<div class="btn-container">
    <button class="cta" id="freq-btn">
        <span class="hover-underline-animation"> Change frequency </span>
        <svg id="arrow-horizontal" xmlns="http://www.w3.org/2000/svg" width="30" height="10" viewBox="0 0 46 16">
            <path id="Path_10" data-name="Path 10" d="M8,0,6.545,1.455l5.506,5.506H-30V9.039H12.052L6.545,14.545,8,16l8-8Z" transform="translate(30)"></path>
        </svg>
    </button>
</div>

<div id="traffic-lights-body">
    <div class="traffic-light-cap">
        <div class="cap-top"></div>
        <div class="cap-bottom"></div>
    </div>
    <div class="lights-flex">
        <div class="lights-item steady-light"></div>
        <div class="lights-item ready-light"></div>
        <div class="lights-item go-light"></div>
    </div>
    <div class="traffic-lights-pole"></div>
    <div class="traffic-lights-flooring"></div>
</div>
<div class="floor"></div>
<script src="script.js"></script>
</body>
</html>
