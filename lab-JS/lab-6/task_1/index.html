<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Управління товарами</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="header-content">
        <h1>Aesthetic Store</h1>
        <div id="total-price" class="total-price">Загальна вартість: 0 ₴</div>
    </div>
</header>

<main class="container">
    <aside class="controls-panel">
        <div class="control-group">
            <h3>Фільтрація:</h3>
            <div id="filter-container" class="button-row"></div>
            <button id="reset-filter-btn" class="secondary-btn">Скинути фільтр</button>
        </div>

        <div class="control-group">
            <h3>Сортування:</h3>
            <div id="sort-container" class="button-row">
                <button data-sort="price">За ціною</button>
                <button data-sort="dateCreated">За датою створення</button>
                <button data-sort="dateUpdated">За датою оновлення</button>
            </div>
            <button id="reset-sort-btn" class="secondary-btn">Скинути сортування</button>
        </div>

        <button id="open-modal-btn" class="primary-btn add-btn">Додати новий товар</button>
    </aside>

    <section id="product-list" class="product-grid"></section>
</main>

<div id="product-modal" class="modal-overlay">
    <div class="modal-content">
        <h2 id="modal-title">Додати новий товар</h2>
        <form id="product-form">
            <div class="form-group">
                <label for="name">Назва товару:</label>
                <input type="text" id="name" required minlength="2" placeholder="Введіть назву">
            </div>
            <div class="form-group">
                <label for="price">Ціна (₴):</label>
                <input type="number" id="price" required min="0" step="0.01" placeholder="0.00">
            </div>
            <div class="form-group">
                <label for="category">Категорія:</label>
                <input type="text" id="category" required placeholder="Наприклад: Одяг, Підписка">
            </div>
            <div class="form-group">
                <label for="image">URL зображення:</label>
                <input type="url" id="image" required placeholder="https://...">
            </div>
            <div class="modal-actions">
                <button type="button" id="close-modal-btn" class="secondary-btn">Скасувати</button>
                <button type="submit" class="primary-btn">Зберегти</button>
            </div>
        </form>
    </div>
</div>

<div id="snackbar" class="snackbar"></div>
<script src="script.js"></script>
</body>
</html>
