<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Список завдань (To-Do)</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <header>
        <h1>My to-do list</h1>
        <p>Твій помічник у продуктивності</p>
    </header>

    <main>
        <form id="todo-form" class="add-task-form">
            <label for="todo-input"></label><input type="text" id="todo-input" placeholder="Що потрібно зробити?" required autocomplete="off">
            <button type="submit" class="primary-btn">Додати</button>
        </form>

        <div class="controls-panel">
            <span>Сортувати:</span>
            <div id="sort-container" class="sort-buttons">
                <button class="active" data-sort="dateCreated">Нові</button>
                <button data-sort="status">За статусом</button>
                <button data-sort="dateUpdated">Оновлені</button>
            </div>
        </div>

        <ul id="todo-list" class="task-list"></ul>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
